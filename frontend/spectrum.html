<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>

<style>
html,body{margin:0;height:100%;overflow:hidden;background:#0b0f14;color:#ddd;font-family:Arial,sans-serif;}
#toolbar{min-height:50px;display:flex;flex-wrap:wrap;align-items:center;gap:10px;padding:8px 10px;background:#111827;border-bottom:1px solid #2a3441;}
#toolbar input,#toolbar select{width:80px;background:#0b0f14;border:1px solid #374151;color:#00ff99;padding:5px;}
#toolbar button{background:#1f2937;color:white;border:1px solid #374151;padding:6px 12px;cursor:pointer;}
#app{display:flex;flex-direction:column;height:100vh;}

/* ── view toggle strip ── */
#viewStrip{
  display:flex;gap:4px;padding:4px 8px;
  background:#111827;border-bottom:1px solid #2a3441;flex-shrink:0;
}
.viewBtn{
  padding:3px 12px;font-size:12px;border-radius:3px;cursor:pointer;
  background:#1f2937;color:#888;border:1px solid #374151;
  transition:color .15s,border-color .15s;
}
.viewBtn.active{color:#00ff99;border-color:#00ff99;}

/* ── pill strips (shared base) ── */
#componentList,#blockList{
    border-bottom:1px solid #2a3441;
    padding:4px 8px;flex-shrink:0;height:32px;
    overflow-x:auto;overflow-y:hidden;
    display:flex;flex-wrap:nowrap;gap:4px;align-items:center;
    box-sizing:border-box;
}
#componentList{ background:#111827; }
#blockList    { background:#0d1117; }

/* hide strip when only the add-button is inside */
#componentList:has(.componentRow:first-of-type),
#blockList:has(.blockRow:first-of-type){ display:flex; }

/* add-button inside strips */
.addPillBtn{
  padding:2px 10px;font-size:12px;border-radius:3px;cursor:pointer;
  background:#1f2937;color:#00ff99;border:1px solid #00ff99;
  white-space:nowrap;flex-shrink:0;
}
.addPillBtn.amber{color:#f59e0b;border-color:#f59e0b;background:#1a1200;}

/* signal source pills */
.componentRow{
    display:inline-flex;align-items:center;gap:5px;padding:2px 8px;
    background:#0b0f14;border:1px solid #2a3441;border-radius:4px;
    font-size:12px;white-space:nowrap;flex-shrink:0;
}
.componentRow.disabled{opacity:0.4;}
.componentRow .c-name{color:#00ff99;font-weight:bold;}
.componentRow .c-detail{color:#888;font-size:11px;}

/* RF block pills */
.blockRow{
    display:inline-flex;align-items:center;gap:5px;padding:2px 8px;
    background:#1a1200;border:1px solid #78350f;border-radius:4px;
    font-size:12px;white-space:nowrap;flex-shrink:0;
}
.blockRow.disabled{opacity:0.4;}
.blockRow .b-name{color:#f59e0b;font-weight:bold;}
.blockRow .b-detail{color:#888;font-size:11px;}

/* shared pill buttons */
.componentRow button,.blockRow button{
  padding:1px 6px;font-size:11px;border-radius:3px;cursor:pointer;
  background:#1f2937;color:#ccc;border:1px solid #374151;
}

/* ── shared add/edit modal ── */
#itemModal{
    display:none;position:fixed;inset:0;z-index:200;
    background:rgba(0,0,0,0.65);align-items:center;justify-content:center;
}
#itemModal.open{display:flex;}
#itemModalBox{
    background:#111827;border-radius:6px;
    padding:20px;min-width:300px;max-width:440px;width:90%;
    display:flex;flex-direction:column;gap:10px;
}
#itemModalBox.sig{ border:1px solid #1d4e2a; }
#itemModalBox.blk{ border:1px solid #78350f; }
#itemModalTitle{ margin:0;font-size:14px;letter-spacing:.4px; }
#itemModalBox.sig #itemModalTitle{ color:#00ff99; }
#itemModalBox.blk #itemModalTitle{ color:#f59e0b; }
#itemTypeSelect{
    background:#0b0f14;border:1px solid #374151;color:#ddd;
    padding:5px;border-radius:3px;width:100%;box-sizing:border-box;
}
#itemModalFields{display:flex;flex-direction:column;gap:6px;}
.mfRow{display:flex;align-items:center;gap:8px;}
.mfRow label{color:#aaa;font-size:12px;min-width:120px;flex-shrink:0;}
.mfRow input{
    flex:1;background:#0b0f14;border:1px solid #374151;
    color:#ddd;padding:4px 6px;border-radius:3px;
}
#itemModalActions{display:flex;gap:8px;justify-content:flex-end;margin-top:4px;}
#itemModalCancel{
    padding:5px 14px;border-radius:3px;cursor:pointer;font-size:12px;
    background:#1f2937;color:#ddd;border:1px solid #374151;
}
#itemModalConfirm{
    padding:5px 18px;border-radius:3px;cursor:pointer;font-size:12px;
    border:none;
}
#itemModalBox.sig #itemModalConfirm{background:#00c97a;color:#000;}
#itemModalBox.blk #itemModalConfirm{background:#f59e0b;color:#000;}
#itemModalBox.dem #itemModalConfirm{background:#a78bfa;color:#000;}
#itemModalBox.dem{ border:1px solid #4c1d95; }
#itemModalBox.dem #itemModalTitle{ color:#a78bfa; }

/* ── panels ── */
#plots{flex:1;min-height:0;display:flex;flex-direction:column;}
.panel{flex:1;min-height:0;display:none;position:relative;}
.panel.visible{display:flex;flex-direction:column;}
#constellation.panel.visible{flex-direction:row;}
.panel + .panel.visible{border-top:1px solid #2a3441;}
#plot{width:100%;height:100%;}
#constellationPlot{
  flex:0 0 auto;
  height:100%;
  aspect-ratio:1/1;
  max-width:100%;
}
#constellationSidebar{
  flex:1;min-width:0;
  display:flex;flex-direction:column;
  border-left:1px solid #2a3441;
  padding:10px;
  color:#aaa;font-size:12px;
  overflow-y:auto;
}
#waterfallCanvas{position:absolute;display:block;}
#waterfallAxisX{position:absolute;bottom:0;left:80px;right:30px;height:20px;pointer-events:none;}
#waterfallAxisY{position:absolute;top:0;left:0;width:80px;height:100%;pointer-events:none;overflow:visible;}
#waterfallTitle{position:absolute;top:6px;left:50%;transform:translateX(-50%);font-size:13px;color:#ddd;pointer-events:none;}
#wfOverlay{position:absolute;cursor:crosshair;z-index:10;}
#wfTooltip{
  position:absolute;display:none;
  background:rgba(0,0,0,0.75);color:#00ff99;
  font-size:11px;font-family:monospace;padding:4px 7px;
  border:1px solid #374151;border-radius:3px;
  pointer-events:none;white-space:pre;z-index:20;
}
</style>
</head>

<body>
<div id="app">

<div id="toolbar">
  <span>Center</span><input id="center" value="100e6">
  <span>Span</span><input id="span" value="20e6">
  <span>Ref</span><input id="ref" value="0">
  <span>Range</span><input id="range" value="100">
  <span>RBW</span><input id="rbw" value="5e3">
  <button id="runBtn">STOP</button>
  <button id="applyY">Apply</button>
</div>

<div id="viewStrip">
  <button class="viewBtn active" data-panel="plot">Spectrum</button>
  <button class="viewBtn"        data-panel="waterfallContainer">Waterfall</button>
  <button class="viewBtn"        data-panel="constellation">Constellation</button>
  <div style="width:1px;background:#2a3441;margin:0 4px;align-self:stretch;"></div>
  <button class="viewBtn active" id="autoscaleBtn">Autoscale Y</button>
</div>

<div id="componentList">
  <button class="addPillBtn" id="addComponentBtn">+ Signal</button>
</div>

<div id="blockList">
  <button class="addPillBtn amber" id="addBlockBtn">+ RF Block</button>
</div>

<!-- Shared add/edit modal -->
<div id="itemModal">
  <div id="itemModalBox">
    <h3 id="itemModalTitle">Add</h3>
    <select id="itemTypeSelect"></select>
    <div id="itemModalFields"></div>
    <div id="itemModalActions">
      <button id="itemModalCancel">Cancel</button>
      <button id="itemModalConfirm">Add</button>
    </div>
  </div>
</div>

<div id="plots">
  <div id="plot"              class="panel visible"></div>
  <div id="waterfallContainer" class="panel" style="background:#111827;">
    <div id="waterfallTitle">Spectrogram</div>
    <canvas id="waterfallCanvas"></canvas>
    <canvas id="waterfallAxisX"></canvas>
    <svg    id="waterfallAxisY"></svg>
    <div    id="wfOverlay"></div>
    <div    id="wfTooltip"></div>
  </div>
  <div id="constellation" class="panel" style="flex-direction:row;">
    <div id="constellationPlot"></div>
    <div id="constellationSidebar">
      <div style="display:flex;gap:12px;align-items:flex-start;flex:0 0 auto;">
        <div style="flex:0 0 90px;">
          <div style="color:#ddd;font-weight:bold;margin-bottom:4px;font-size:11px;">View</div>
          <select id="constellationMode" style="width:100%;background:#0b0f14;border:1px solid #374151;color:#00ff99;padding:3px 4px;border-radius:3px;box-sizing:border-box;font-size:11px;">
            <option value="raw">Raw IQ</option>
            <option value="symbols">Symbols</option>
            <option value="off">Off</option>
          </select>
          <label style="display:flex;align-items:center;gap:4px;margin-top:5px;cursor:pointer;user-select:none;font-size:10px;white-space:nowrap;">
            <input type="checkbox" id="showRefPointsToggle" checked style="cursor:pointer;">
            <span>Ref. pts</span>
          </label>
        </div>

        <div style="flex:0 0 auto;border-left:1px solid #2a3441;padding-left:12px;">
          <div style="color:#a78bfa;font-weight:bold;margin-bottom:4px;font-size:11px;">Demod</div>
          <div id="constellationSidebarBody" style="font-size:11px;">No demodulator active.</div>
        </div>

        <div style="flex:1;min-width:0;display:flex;align-items:center;justify-content:flex-end;gap:8px;">
          <span style="color:#ddd;font-weight:bold;font-size:11px;">Graph</span>
          <select id="demodGraphMode" style="background:#0b0f14;border:1px solid #374151;color:#ccc;padding:2px 5px;border-radius:3px;box-sizing:border-box;font-size:11px;">
            <option value="time">Error vs Time</option>
            <option value="freq">Error vs Freq</option>
            <option value="phase">Phase Error vs Time</option>
            <option value="phase_freq">Phase Error vs Freq</option>
          </select>
        </div>
      </div>

      <div style="display:flex;align-items:center;gap:10px;margin-top:8px;flex:0 0 auto;flex-wrap:wrap;">
        <button id="evmUnitToggle" style="padding:2px 7px;font-size:10px;background:#1f2937;color:#ccc;border:1px solid #374151;border-radius:3px;cursor:pointer;flex:0 0 auto;">%</button>

        <div style="display:flex;flex-direction:column;line-height:1.1;">
          <span style="font-size:9px;color:#888;">EVM mean</span>
          <span id="evmReadout" style="font-size:15px;color:#00ff99;font-family:monospace;white-space:nowrap;">—</span>
        </div>
        <div style="display:flex;flex-direction:column;line-height:1.1;">
          <span style="font-size:9px;color:#888;">EVM peak</span>
          <span id="evmPeakReadout" style="font-size:15px;color:#00ff99;font-family:monospace;white-space:nowrap;">—</span>
        </div>
        <div style="display:flex;flex-direction:column;line-height:1.1;">
          <span style="font-size:9px;color:#888;">Phase err mean</span>
          <span id="phaseErrorReadout" style="font-size:15px;color:#60a5fa;font-family:monospace;white-space:nowrap;">—</span>
        </div>
        <div style="display:flex;flex-direction:column;line-height:1.1;">
          <span style="font-size:9px;color:#888;">Phase err peak</span>
          <span id="phaseErrorPeakReadout" style="font-size:15px;color:#60a5fa;font-family:monospace;white-space:nowrap;">—</span>
        </div>
      </div>

      <div style="flex:1;min-height:0;display:flex;flex-direction:column;margin-top:8px;">
        <div style="position:relative;flex:1;min-height:0;">
          <canvas id="evmSparkline" style="width:100%;height:100%;display:block;background:#0b0f14;border:1px solid #1f2937;border-radius:3px;"></canvas>
          <div id="evmChartTooltip" style="display:none;position:absolute;pointer-events:none;background:rgba(0,0,0,0.85);border:1px solid #374151;border-radius:3px;padding:4px 7px;font-size:11px;font-family:monospace;color:#00ff99;white-space:nowrap;z-index:10;"></div>
        </div>
        <div style="display:flex;justify-content:space-between;font-size:10px;color:#666;margin-top:2px;flex:0 0 auto;">
          <span id="evmSparkMin">—</span>
          <span id="evmSparkLabel" style="color:#888;">EVM per symbol (current chunk)</span>
          <span id="evmSparkMax">—</span>
        </div>
      </div>
    </div>
  </div>
</div>

</div>

<script>

// Plotly margin constants — must match spectrumLayout.margin
const PLT_L = 80, PLT_R = 30, PLT_T = 40, PLT_B = 50;


// --- Turbo colormap (accurate 16-stop LUT) ---
const TURBO_LUT = [
  [48,18,59],[65,30,120],[82,52,165],[94,79,199],
  [101,108,223],[101,137,234],[93,163,232],[79,188,214],
  [63,210,187],[55,227,157],[79,237,117],[120,243,72],
  [165,244,41],[206,238,30],[237,220,37],[253,192,55],
  [254,158,64],[247,121,67],[234,85,64],[213,52,56],
  [185,26,43],[152,10,29],[114,1,15],[68,1,8]
];

function turboColor(t) {
  t = Math.max(0, Math.min(1, t));
  const idx = t * (TURBO_LUT.length - 1);
  const lo = Math.floor(idx);
  const hi = Math.min(lo + 1, TURBO_LUT.length - 1);
  const frac = idx - lo;
  const a = TURBO_LUT[lo], b = TURBO_LUT[hi];
  return [
    Math.round(a[0] + frac * (b[0] - a[0])),
    Math.round(a[1] + frac * (b[1] - a[1])),
    Math.round(a[2] + frac * (b[2] - a[2]))
  ];
}

// --- Canvas waterfall state ---
let wfCanvas, wfCtx;
let wfBuffer    = null;
let wfFreqMHz   = null;   // last freq axis, used by hover
let wfRows      = 0;      // how many rows have been written (capped at H)
let wfTimeBuf   = null;   // Float64Array — one timestamp (ms) per row
let wfNewestTime = 0;     // timestamp of the bottom row

function initWaterfallCanvas() {
  wfCanvas = document.getElementById("waterfallCanvas");
  wfCtx = wfCanvas.getContext("2d");

  const overlay = document.getElementById("wfOverlay");
  overlay.addEventListener("mousemove", onWfHover);
  overlay.addEventListener("mouseleave", ()=>{
    document.getElementById("wfTooltip").style.display = "none";
  });
}

function resizeWaterfallCanvas() {
  if (!wfCanvas) return;
  const container = document.getElementById("waterfallContainer");
  const CW = container.clientWidth;
  const CH = container.clientHeight;
  if (CW === 0 || CH === 0) return;

  const dW = Math.max(1, CW - PLT_L - PLT_R);
  const dH = Math.max(1, CH);

  wfCanvas.style.position = "absolute";
  wfCanvas.style.left   = PLT_L + "px";
  wfCanvas.style.top    = "0";
  wfCanvas.style.width  = (CW - PLT_L - PLT_R) + "px";
  wfCanvas.style.height = CH + "px";
  wfCanvas.width  = dW;
  wfCanvas.height = dH;

  wfBuffer   = wfCtx.createImageData(dW, dH);
  wfPowerBuf = new Float32Array(dW * dH);
  wfTimeBuf  = new Float64Array(dH);   // one entry per pixel row
  wfRows     = 0;
  wfNewestTime = 0;

  const overlay = document.getElementById("wfOverlay");
  overlay.style.left   = PLT_L + "px";
  overlay.style.top    = "0";
  overlay.style.width  = (CW - PLT_L - PLT_R) + "px";
  overlay.style.height = CH + "px";

  if (wfFreqMHz) drawWaterfallXAxis(wfFreqMHz);
}

function drawWaterfallRow(powerDb, freqMHz, timeSec) {
  if (!wfCanvas || !wfCtx || !wfBuffer) return;
  const W = wfCanvas.width;
  const H = wfCanvas.height;
  if (W === 0 || H === 0) return;
  wfFreqMHz = freqMHz;

  const data     = wfBuffer.data;
  const ref      = getRef();
  const range    = getRange();
  const nBins    = powerDb.length;
  const rowBytes = W * 4;
  const tSec     = (timeSec != null) ? timeSec : (Date.now() / 1000);

  // Shift buffers DOWN by one row (oldest row falls off the bottom)
  data.copyWithin(rowBytes, 0, (H - 1) * rowBytes);
  if (wfPowerBuf) wfPowerBuf.copyWithin(W, 0, (H - 1) * W);
  if (wfTimeBuf)  wfTimeBuf.copyWithin(1, 0, H - 1);

  // Write new row at top (row 0 = newest)
  for (let x = 0; x < W; x++) {
    const binIndex = Math.min(Math.floor(x / W * nBins), nBins - 1);
    const norm = (powerDb[binIndex] - (ref - range)) / range;
    const [r, g, b] = turboColor(norm);
    const i = x * 4;
    data[i]     = r;
    data[i + 1] = g;
    data[i + 2] = b;
    data[i + 3] = 255;
    if (wfPowerBuf) wfPowerBuf[x] = powerDb[binIndex];
  }
  if (wfTimeBuf) wfTimeBuf[0] = tSec;
  wfNewestTime = tSec;

  wfCtx.putImageData(wfBuffer, 0, 0);
  if (wfRows < H) wfRows++;

  drawWaterfallXAxis(freqMHz);
  drawWaterfallYAxis();
}

function drawWaterfallXAxis(freqMHz) {
  const axCanvas = document.getElementById("waterfallAxisX");
  if (!axCanvas || !freqMHz || freqMHz.length < 2) return;
  const cw = axCanvas.offsetWidth;
  const ch = axCanvas.offsetHeight;
  if (!cw || !ch) return;
  axCanvas.width  = cw;
  axCanvas.height = ch;
  const ctx = axCanvas.getContext("2d");
  ctx.clearRect(0, 0, cw, ch);
  ctx.fillStyle = "#888";
  ctx.font = "10px Arial";
  ctx.textAlign = "center";
  const nLabels = Math.max(1, Math.floor(cw / 80));
  for (let i = 0; i <= nLabels; i++) {
    const frac = i / nLabels;
    const idx  = Math.min(Math.floor(frac * freqMHz.length), freqMHz.length - 1);
    ctx.fillText(freqMHz[idx].toFixed(2), frac * cw, 12);
  }
}

function drawWaterfallYAxis() {
  const svg = document.getElementById("waterfallAxisY");
  if (!svg || !wfTimeBuf || wfRows < 2) return;
  const H  = wfCanvas.height;
  const CH = wfCanvas.offsetHeight || H;
  const scaleY = CH / H;   // display px per canvas row

  // Row 0 = newest (top), rows increase downward = older
  // wfTimeBuf[0] = newest time (sec), wfTimeBuf[wfRows-1] = oldest visible
  const newestSec = wfTimeBuf[0];
  const oldestSec = wfTimeBuf[wfRows - 1];
  const spanSec   = newestSec - oldestSec;
  if (spanSec <= 0) return;

  // Pick a nice tick interval targeting ~one label per 40px
  const targetLabels = Math.max(2, Math.floor(CH / 40));
  const rawInterval  = spanSec / targetLabels;
  const niceSteps    = [0.05,0.1,0.2,0.5,1,2,5,10,15,30,60,120,300,600];
  const interval     = niceSteps.find(s => s >= rawInterval) || niceSteps[niceSteps.length - 1];

  const svgW = PLT_L;
  const svgH = CH;
  let html = `<rect width="${svgW}" height="${svgH}" fill="#111827"/>`;

  // Emit a tick whenever we cross a multiple of `interval` seconds below newestSec
  let lastTick = -Infinity;
  for (let row = 0; row < wfRows; row++) {
    const deltaSec = newestSec - wfTimeBuf[row];   // 0 at top, grows downward
    const tick = Math.floor(deltaSec / interval);
    if (tick !== lastTick) {
      lastTick = tick;
      const y = Math.round(row * scaleY);
      if (y < 0 || y > svgH) continue;
      const label = "+" + (tick * interval).toFixed(
        interval < 1 ? 2 : interval < 10 ? 1 : 0
      ) + "s";
      html += `<line x1="${svgW-6}" y1="${y}" x2="${svgW}" y2="${y}" stroke="#555" stroke-width="1"/>`;
      html += `<text x="${svgW-8}" y="${y+4}" text-anchor="end" fill="#888" font-size="10" font-family="Arial">${label}</text>`;
    }
  }
  svg.setAttribute("width",  svgW);
  svg.setAttribute("height", svgH);
  svg.innerHTML = html;
}

function formatTimeSec(totalSec) {
  const d   = new Date(totalSec * 1000);
  const hh  = String(d.getHours()).padStart(2,"0");
  const mm  = String(d.getMinutes()).padStart(2,"0");
  const ss  = String(d.getSeconds()).padStart(2,"0");
  return `${hh}:${mm}:${ss}`;
}

function onWfHover(e) {
  if (!wfFreqMHz || !wfBuffer || wfRows === 0) return;
  const overlay = document.getElementById("wfOverlay");
  const tip     = document.getElementById("wfTooltip");
  const rect    = overlay.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  const W = wfCanvas.width;
  const H = wfCanvas.height;

  const binIndex = Math.min(Math.floor(x / rect.width * wfFreqMHz.length), wfFreqMHz.length - 1);
  const freqVal  = wfFreqMHz[binIndex];
  const pixelX   = Math.floor(x / rect.width * W);
  const rowIndex = Math.min(Math.floor(y / rect.height * H), H - 1);

  const powerVal = wfPowerBuf ? wfPowerBuf[rowIndex * W + pixelX] : null;
  const tSec     = wfTimeBuf  ? wfTimeBuf[rowIndex]               : null;
  const newestT  = wfTimeBuf  ? wfTimeBuf[0]                      : null;
  const deltaStr = (tSec != null && newestT != null && tSec > 0)
    ? "+" + (newestT - tSec).toFixed(2) + "s"
    : null;

  // Keep tooltip inside the overlay
  const tipX = (x + 14 + 120 > rect.width)  ? x - 130 : x + 14;
  const tipY = (y - 10 < 0)                  ? 4       : y - 10;

  tip.style.display = "block";
  tip.style.left    = tipX + "px";
  tip.style.top     = tipY + "px";
  tip.textContent   = [
    freqVal.toFixed(3) + " MHz",
    powerVal != null ? powerVal.toFixed(1) + " dB/Hz" : null,
    deltaStr  ? "⏱ " + deltaStr : null,
  ].filter(Boolean).join("\n");
}

// Parallel power buffer (Float32) so hover can read actual dB values
let wfPowerBuf = null;

// ── Ideal QAM reference constellation (top-level, available before onload) ──
let currentQAM_M = null;
let showRefPoints = true;
let evmUnit = "pct"; // "pct" | "db"
let lastEvmPercent = null;
let lastEvmPeakPercent = null;
let lastPhaseErrorDeg = null;
let lastPhaseErrorPeakDeg = null;
let lastEvmPerSymbol = null; // Float32Array/array of per-symbol EVM% for the current chunk (time mode)
let lastPhaseErrorsDeg = null; // Float32Array of per-symbol phase error (degrees) for the current chunk
let lastEvmFreqData = null;  // { freqs: Float32Array(Hz), mag: Float32Array } for freq mode
let lastPhaseFreqData = null; // { freqs: Float32Array(Hz), mag: Float32Array(deg) } for phase_freq mode
// FFT bin frequency axis (Hz) for the error spectrum. This is derived
// purely from FFT size and symbol rate, so it only changes when settings
// change -- not every frame -- and arrives via the JSON scalar message
// rather than being resent as a binary array on every single frame.
let lastErrorFreqAxis = null;

// Geometry from the most recent draw, used by the hover handler to map a
// mouse pixel position back to the nearest data point without redoing
// the chart's scaling math from scratch on every mousemove.
let evmChartGeom = null; // { mode, dpr, padL, padT, plotW, plotH, xs:[], ys:[], values:[], unitSuffix }

function evmChartTicks(minV, maxV, count) {
  // Evenly spaced tick values between minV and maxV (inclusive), guarding
  // against a degenerate zero-range chart.
  if (maxV - minV < 1e-9) return [minV];
  const ticks = [];
  for (let i = 0; i < count; i++) {
    ticks.push(minV + (maxV - minV) * (i / (count - 1)));
  }
  return ticks;
}

function renderEvmReadout() {
  const evmEl     = document.getElementById("evmReadout");
  const evmPeakEl = document.getElementById("evmPeakReadout");
  const phaseEl     = document.getElementById("phaseErrorReadout");
  const phasePeakEl = document.getElementById("phaseErrorPeakReadout");

  const fmtEvm = (pct) => {
    if (pct == null) return "—";
    if (evmUnit === "db") {
      return (20 * Math.log10(pct / 100)).toFixed(2) + " dB";
    }
    return pct.toFixed(2) + " %";
  };
  const fmtDeg = (deg) => (deg == null) ? "—" : deg.toFixed(2) + "°";

  if (evmEl)       evmEl.textContent       = fmtEvm(lastEvmPercent);
  if (evmPeakEl)   evmPeakEl.textContent   = fmtEvm(lastEvmPeakPercent);
  if (phaseEl)      phaseEl.textContent      = fmtDeg(lastPhaseErrorDeg);
  if (phasePeakEl)  phasePeakEl.textContent  = fmtDeg(lastPhaseErrorPeakDeg);
}

function updateEvmSparkLabel(mode) {
  const labelEl = document.getElementById("evmSparkLabel");
  if (!labelEl) return;
  const labels = {
    time: "EVM per symbol (current chunk)",
    freq: "Error spectrum (look for in-band spurs)",
    phase: "Phase error per symbol (current chunk)",
    phase_freq: "Phase error spectrum (look for in-band spurs)",
  };
  labelEl.textContent = labels[mode] || labels.time;
}

function setEvmPerSymbol(perSymbolPct) {
  lastEvmPerSymbol = perSymbolPct; // null clears the chart
  drawEvmSparkline();
}

function setPhaseErrorsDeg(phaseDeg) {
  lastPhaseErrorsDeg = phaseDeg; // null clears the chart
  drawEvmSparkline();
}

function setEvmFreqData(freqData) {
  lastEvmFreqData = freqData; // null clears the chart
  drawEvmSparkline();
}

function setPhaseFreqData(freqData) {
  lastPhaseFreqData = freqData; // null clears the chart
  drawEvmSparkline();
}

function drawEvmSparkline() {
  const canvas = document.getElementById("evmSparkline");
  if (!canvas) return;
  const mode = document.getElementById("demodGraphMode")?.value || "time";

  // Match the backing pixel buffer to the canvas's actual rendered size
  // (it has no fixed width/height attributes; its size comes from flex layout).
  const rect = canvas.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  const targetW = Math.max(1, Math.round(rect.width * dpr));
  const targetH = Math.max(1, Math.round(rect.height * dpr));
  if (canvas.width !== targetW || canvas.height !== targetH) {
    canvas.width = targetW;
    canvas.height = targetH;
  }
  const ctx = canvas.getContext("2d");
  const w = canvas.width, h = canvas.height;
  ctx.clearRect(0, 0, w, h);

  const minEl = document.getElementById("evmSparkMin");
  const maxEl = document.getElementById("evmSparkMax");

  if (mode === "freq") {
    drawEvmFreqChart(ctx, w, h, dpr, minEl, maxEl);
  } else if (mode === "phase") {
    drawPhaseTimeChart(ctx, w, h, dpr, minEl, maxEl);
  } else if (mode === "phase_freq") {
    drawPhaseFreqChart(ctx, w, h, dpr, minEl, maxEl);
  } else {
    drawEvmTimeChart(ctx, w, h, dpr, minEl, maxEl);
  }
}

function drawEvmTimeChart(ctx, w, h, dpr, minEl, maxEl) {
  const n = lastEvmPerSymbol ? lastEvmPerSymbol.length : 0;
  if (n < 2) {
    if (minEl) minEl.textContent = "—";
    if (maxEl) maxEl.textContent = "—";
    evmChartGeom = null;
    return;
  }

  // Convert to the currently selected display unit for plotting
  const vals = (evmUnit === "db")
    ? Array.from(lastEvmPerSymbol, p => 20 * Math.log10(Math.max(p, 1e-6) / 100))
    : Array.from(lastEvmPerSymbol);

  const minV = Math.min(...vals);
  const maxV = Math.max(...vals);
  const range = (maxV - minV) || 1; // avoid divide-by-zero on a flat line

  const padL = 8 * dpr, padR = 8 * dpr, padT = 6 * dpr, padB = 16 * dpr;
  const plotW = w - padL - padR;
  const plotH = h - padT - padB;

  // Vertical gridlines + symbol-index ticks along the x axis
  const tickCount = 6;
  ctx.strokeStyle = "#1f2937";
  ctx.lineWidth = 1 * dpr;
  ctx.fillStyle = "#666";
  ctx.font = `${10 * dpr}px monospace`;
  ctx.textAlign = "center";
  for (let i = 0; i < tickCount; i++) {
    const frac = i / (tickCount - 1);
    const x = padL + frac * plotW;
    ctx.beginPath();
    ctx.moveTo(x, padT);
    ctx.lineTo(x, padT + plotH);
    ctx.stroke();
    const symIdx = Math.round(frac * (n - 1));
    ctx.fillText(String(symIdx), x, h - 3 * dpr);
  }

  const unitSuffix = evmUnit === "db" ? " dB" : " %";
  const xs = [], values = [];

  ctx.strokeStyle = "#00ff99";
  ctx.lineWidth = 1 * dpr;
  ctx.globalAlpha = 0.85;
  ctx.beginPath();
  for (let idx = 0; idx < n; idx++) {
    const x = padL + (idx / (n - 1)) * plotW;
    const yNorm = (vals[idx] - minV) / range; // 0 = min, 1 = max
    const y = padT + (1 - yNorm) * plotH;
    if (idx === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
    xs.push(x);
    values.push(vals[idx]);
  }
  ctx.stroke();
  ctx.globalAlpha = 1;

  if (minEl) minEl.textContent = minV.toFixed(1) + unitSuffix;
  if (maxEl) maxEl.textContent = maxV.toFixed(1) + unitSuffix;

  evmChartGeom = {
    mode: "time", dpr, padL, padT, plotW, plotH,
    xs, values, unitSuffix,
    labelFor: (idx) => `Symbol ${idx}`,
  };
}

function drawPhaseTimeChart(ctx, w, h, dpr, minEl, maxEl) {
  const n = lastPhaseErrorsDeg ? lastPhaseErrorsDeg.length : 0;
  if (n < 2) {
    if (minEl) minEl.textContent = "—";
    if (maxEl) maxEl.textContent = "—";
    evmChartGeom = null;
    return;
  }

  const vals = Array.from(lastPhaseErrorsDeg);

  const minV = Math.min(...vals);
  const maxV = Math.max(...vals);
  // Keep the range symmetric around 0 so a flat-zero signal centers nicely
  // and the zero-reference line below is meaningful at a glance.
  const absMax = Math.max(Math.abs(minV), Math.abs(maxV)) || 1;
  const plotMinV = -absMax, plotMaxV = absMax;
  const range = (plotMaxV - plotMinV) || 1;

  const padL = 8 * dpr, padR = 8 * dpr, padT = 6 * dpr, padB = 16 * dpr;
  const plotW = w - padL - padR;
  const plotH = h - padT - padB;

  // Vertical gridlines + symbol-index ticks along the x axis
  const tickCount = 6;
  ctx.strokeStyle = "#1f2937";
  ctx.lineWidth = 1 * dpr;
  ctx.fillStyle = "#666";
  ctx.font = `${10 * dpr}px monospace`;
  ctx.textAlign = "center";
  for (let i = 0; i < tickCount; i++) {
    const frac = i / (tickCount - 1);
    const x = padL + frac * plotW;
    ctx.beginPath();
    ctx.moveTo(x, padT);
    ctx.lineTo(x, padT + plotH);
    ctx.stroke();
    const symIdx = Math.round(frac * (n - 1));
    ctx.fillText(String(symIdx), x, h - 3 * dpr);
  }

  // Zero-degree reference line — a flat line here means no systematic
  // phase offset; a steady ramp away from it signals carrier frequency
  // offset rather than a fixed phase offset.
  const y0 = padT + (1 - (0 - plotMinV) / range) * plotH;
  ctx.strokeStyle = "#4b5563";
  ctx.lineWidth = 1 * dpr;
  ctx.setLineDash([3 * dpr, 3 * dpr]);
  ctx.beginPath();
  ctx.moveTo(padL, y0);
  ctx.lineTo(padL + plotW, y0);
  ctx.stroke();
  ctx.setLineDash([]);

  const unitSuffix = "°";
  const xs = [], values = [];

  ctx.strokeStyle = "#60a5fa";
  ctx.lineWidth = 1 * dpr;
  ctx.globalAlpha = 0.85;
  ctx.beginPath();
  for (let idx = 0; idx < n; idx++) {
    const x = padL + (idx / (n - 1)) * plotW;
    const yNorm = (vals[idx] - plotMinV) / range;
    const y = padT + (1 - yNorm) * plotH;
    if (idx === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
    xs.push(x);
    values.push(vals[idx]);
  }
  ctx.stroke();
  ctx.globalAlpha = 1;

  if (minEl) minEl.textContent = minV.toFixed(1) + unitSuffix;
  if (maxEl) maxEl.textContent = maxV.toFixed(1) + unitSuffix;

  evmChartGeom = {
    mode: "phase", dpr, padL, padT, plotW, plotH,
    xs, values, unitSuffix,
    labelFor: (idx) => `Symbol ${idx}`,
  };
}

function drawEvmFreqChart(ctx, w, h, dpr, minEl, maxEl) {
  const n = lastEvmFreqData ? lastEvmFreqData.mag.length : 0;
  if (n < 2 || !lastEvmFreqData.freqs) {
    if (minEl) minEl.textContent = "—";
    if (maxEl) maxEl.textContent = "—";
    evmChartGeom = null;
    return;
  }

  const freqs = lastEvmFreqData.freqs; // Hz, same length as mag
  const mag   = lastEvmFreqData.mag;

  // Plot magnitude in dB — spurs are far easier to spot on a log scale
  // than on a linear one, same convention as the main spectrum view.
  const magDb = Array.from(mag, m => 20 * Math.log10(Math.max(m, 1e-12)));

  const minV = Math.min(...magDb);
  const maxV = Math.max(...magDb);
  const range = (maxV - minV) || 1;

  const padL = 38 * dpr, padR = 8 * dpr, padT = 6 * dpr, padB = 16 * dpr;
  const plotW = w - padL - padR;
  const plotH = h - padT - padB;

  // Sort by frequency once (FFT bin order may already be sorted, but
  // fftshift-style outputs sometimes aren't) so the trace draws left-to-right.
  const order = Array.from(freqs.keys()).sort((a, b) => freqs[a] - freqs[b]);
  const fMin = freqs[order[0]];
  const fMax = freqs[order[order.length - 1]];
  const fRange = (fMax - fMin) || 1;

  // Vertical gridlines + frequency tick labels (kHz)
  const tickCount = 6;
  ctx.strokeStyle = "#1f2937";
  ctx.lineWidth = 1 * dpr;
  ctx.fillStyle = "#666";
  ctx.font = `${10 * dpr}px monospace`;
  for (let i = 0; i < tickCount; i++) {
    const frac = i / (tickCount - 1);
    const x = padL + frac * plotW;
    ctx.beginPath();
    ctx.moveTo(x, padT);
    ctx.lineTo(x, padT + plotH);
    ctx.stroke();
    const fVal = fMin + frac * fRange;
    ctx.textAlign = (i === 0) ? "left" : (i === tickCount - 1) ? "right" : "center";
    ctx.fillText((fVal / 1e3).toFixed(0) + "k", x, h - 3 * dpr);
  }

  // Horizontal gridlines + dB tick labels on the left
  ctx.textAlign = "right";
  const yTickCount = 4;
  for (let i = 0; i < yTickCount; i++) {
    const frac = i / (yTickCount - 1);
    const y = padT + frac * plotH;
    ctx.beginPath();
    ctx.moveTo(padL, y);
    ctx.lineTo(padL + plotW, y);
    ctx.stroke();
    const dbVal = maxV - frac * range;
    ctx.fillText(dbVal.toFixed(0), padL - 4 * dpr, y + 3 * dpr);
  }

  const xs = [], values = [];

  ctx.strokeStyle = "#f59e0b";
  ctx.lineWidth = 1 * dpr;
  ctx.globalAlpha = 0.9;
  ctx.beginPath();
  order.forEach((idx, i) => {
    const x = padL + ((freqs[idx] - fMin) / fRange) * plotW;
    const yNorm = (magDb[idx] - minV) / range;
    const y = padT + (1 - yNorm) * plotH;
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
    xs.push(x);
    values.push({ freq: freqs[idx], db: magDb[idx] });
  });
  ctx.stroke();
  ctx.globalAlpha = 1;

  // Zero-frequency reference line (carrier/DC), helps anchor spur offsets
  if (fMin <= 0 && fMax >= 0) {
    const x0 = padL + ((0 - fMin) / fRange) * plotW;
    ctx.strokeStyle = "#4b5563";
    ctx.lineWidth = 1 * dpr;
    ctx.setLineDash([3 * dpr, 3 * dpr]);
    ctx.beginPath();
    ctx.moveTo(x0, padT);
    ctx.lineTo(x0, padT + plotH);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  if (minEl) minEl.textContent = minV.toFixed(1) + " dB";
  if (maxEl) maxEl.textContent = maxV.toFixed(1) + " dB";

  evmChartGeom = {
    mode: "freq", dpr, padL, padT, plotW, plotH,
    xs, values, unitSuffix: " dB",
    labelFor: (i) => `${(values[i].freq / 1e3).toFixed(2)} kHz`,
  };
}

function drawPhaseFreqChart(ctx, w, h, dpr, minEl, maxEl) {
  const n = lastPhaseFreqData ? lastPhaseFreqData.mag.length : 0;
  if (n < 2 || !lastPhaseFreqData.freqs) {
    if (minEl) minEl.textContent = "—";
    if (maxEl) maxEl.textContent = "—";
    evmChartGeom = null;
    return;
  }

  const freqs = lastPhaseFreqData.freqs; // Hz, same length as mag
  const deg   = lastPhaseFreqData.mag;   // degrees — no dB conversion, phase isn't a power quantity

  const minV = Math.min(...deg);
  const maxV = Math.max(...deg);
  // Keep the range symmetric around 0, same rationale as the phase-vs-time
  // chart: a flat-zero spectrum centers nicely and the zero line is meaningful.
  const absMax = Math.max(Math.abs(minV), Math.abs(maxV)) || 1;
  const plotMinV = -absMax, plotMaxV = absMax;
  const range = (plotMaxV - plotMinV) || 1;

  const padL = 30 * dpr, padR = 8 * dpr, padT = 6 * dpr, padB = 16 * dpr;
  const plotW = w - padL - padR;
  const plotH = h - padT - padB;

  // Sort by frequency once (FFT bin order may already be sorted, but
  // fftshift-style outputs sometimes aren't) so the trace draws left-to-right.
  const order = Array.from(freqs.keys()).sort((a, b) => freqs[a] - freqs[b]);
  const fMin = freqs[order[0]];
  const fMax = freqs[order[order.length - 1]];
  const fRange = (fMax - fMin) || 1;

  // Vertical gridlines + frequency tick labels (kHz)
  const tickCount = 6;
  ctx.strokeStyle = "#1f2937";
  ctx.lineWidth = 1 * dpr;
  ctx.fillStyle = "#666";
  ctx.font = `${10 * dpr}px monospace`;
  for (let i = 0; i < tickCount; i++) {
    const frac = i / (tickCount - 1);
    const x = padL + frac * plotW;
    ctx.beginPath();
    ctx.moveTo(x, padT);
    ctx.lineTo(x, padT + plotH);
    ctx.stroke();
    const fVal = fMin + frac * fRange;
    ctx.textAlign = (i === 0) ? "left" : (i === tickCount - 1) ? "right" : "center";
    ctx.fillText((fVal / 1e3).toFixed(0) + "k", x, h - 3 * dpr);
  }

  // Horizontal gridlines + degree tick labels on the left
  ctx.textAlign = "right";
  const yTickCount = 5; // odd count so the middle tick lands exactly on 0
  for (let i = 0; i < yTickCount; i++) {
    const frac = i / (yTickCount - 1);
    const y = padT + frac * plotH;
    ctx.beginPath();
    ctx.moveTo(padL, y);
    ctx.lineTo(padL + plotW, y);
    ctx.stroke();
    const degVal = plotMaxV - frac * range;
    ctx.fillText(degVal.toFixed(0), padL - 4 * dpr, y + 3 * dpr);
  }

  const xs = [], values = [];

  ctx.strokeStyle = "#60a5fa";
  ctx.lineWidth = 1 * dpr;
  ctx.globalAlpha = 0.9;
  ctx.beginPath();
  order.forEach((idx, i) => {
    const x = padL + ((freqs[idx] - fMin) / fRange) * plotW;
    const yNorm = (deg[idx] - plotMinV) / range;
    const y = padT + (1 - yNorm) * plotH;
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
    xs.push(x);
    values.push({ freq: freqs[idx], deg: deg[idx] });
  });
  ctx.stroke();
  ctx.globalAlpha = 1;

  // Zero-frequency reference line (carrier/DC), helps anchor spur offsets
  if (fMin <= 0 && fMax >= 0) {
    const x0 = padL + ((0 - fMin) / fRange) * plotW;
    ctx.strokeStyle = "#4b5563";
    ctx.lineWidth = 1 * dpr;
    ctx.setLineDash([3 * dpr, 3 * dpr]);
    ctx.beginPath();
    ctx.moveTo(x0, padT);
    ctx.lineTo(x0, padT + plotH);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  if (minEl) minEl.textContent = minV.toFixed(1) + "°";
  if (maxEl) maxEl.textContent = maxV.toFixed(1) + "°";

  evmChartGeom = {
    mode: "phase_freq", dpr, padL, padT, plotW, plotH,
    xs, values, unitSuffix: "°",
    labelFor: (i) => `${(values[i].freq / 1e3).toFixed(2)} kHz`,
  };
}

function evmChartOnMouseMove(e) {
  const canvas  = document.getElementById("evmSparkline");
  const tooltip = document.getElementById("evmChartTooltip");
  if (!canvas || !tooltip || !evmChartGeom) return;

  const rect = canvas.getBoundingClientRect();
  const mouseX = (e.clientX - rect.left) * evmChartGeom.dpr;

  // Nearest point by x-pixel position (xs is monotonically increasing
  // for both chart modes, so a linear scan is fine for typical chunk sizes).
  const xs = evmChartGeom.xs;
  let nearest = 0, bestDist = Infinity;
  for (let i = 0; i < xs.length; i++) {
    const d = Math.abs(xs[i] - mouseX);
    if (d < bestDist) { bestDist = d; nearest = i; }
  }

  const valueText = (evmChartGeom.mode === "freq")
    ? evmChartGeom.values[nearest].db.toFixed(2) + evmChartGeom.unitSuffix
    : (evmChartGeom.mode === "phase_freq")
    ? evmChartGeom.values[nearest].deg.toFixed(2) + evmChartGeom.unitSuffix
    : evmChartGeom.values[nearest].toFixed(2) + evmChartGeom.unitSuffix;

  tooltip.textContent = `${evmChartGeom.labelFor(nearest)}: ${valueText}`;
  tooltip.style.display = "block";

  // Position relative to the wrapper div (CSS pixels, not device pixels)
  const cssX = xs[nearest] / evmChartGeom.dpr;
  const wrapperW = rect.width;
  const tooltipW = tooltip.offsetWidth || 100;
  const left = Math.min(Math.max(cssX - tooltipW / 2, 2), wrapperW - tooltipW - 2);
  tooltip.style.left = left + "px";
  tooltip.style.top  = "4px";
}

function evmChartOnMouseLeave() {
  const tooltip = document.getElementById("evmChartTooltip");
  if (tooltip) tooltip.style.display = "none";
}

// Square QAM only (M = 4, 16, 64, 256, ...). Levels are symmetric odd integers
// (..., -3, -1, 1, 3, ...) normalized so average symbol power = 1, matching
// a unit-power-normalized demodulator output.
function idealQAMPoints(M) {
  const side = Math.round(Math.sqrt(M));
  if (side * side !== M || side < 2) return null; // not a square QAM order

  const levels = [];
  for (let k = 0; k < side; k++) levels.push(2 * k - (side - 1)); // e.g. side=4 -> -3,-1,1,3

  // Average power of an unnormalized square QAM constellation = 2*(M-1)/3
  const avgPower = 2 * (M - 1) / 3;
  const norm = Math.sqrt(avgPower);

  const xs = [], ys = [];
  for (const i of levels) {
    for (const q of levels) {
      xs.push(i / norm);
      ys.push(q / norm);
    }
  }
  return { x: xs, y: ys };
}

function refTrace() {
  const pts = (showRefPoints && currentQAM_M) ? idealQAMPoints(currentQAM_M) : null;
  if (!pts) return { x:[], y:[], mode:"markers", type:"scatter", marker:{size:1} };
  return {
    x: pts.x, y: pts.y,
    mode:"markers", type:"scatter",
    marker:{ size:9, symbol:"cross-thin", color:"#f59e0b",
              line:{color:"#f59e0b", width:1} },
    hoverinfo:"skip",
    showlegend:false,
  };
}

};

// Y-axis autoscale — lives here so it can close over spectrumLayout
let yAutoscale  = true;
let yPeakSmooth = null;
let yValleySmooth = null;
const Y_HEADROOM = 10;
const Y_FLOOR    = 60;
const Y_ALPHA    = 0.05;

function autoscaleY(powerDb) {
  if (!yAutoscale || !powerDb || powerDb.length === 0) return;
  const peak = Math.max(...powerDb);
  const valley = Math.min(...powerDb);
  yPeakSmooth = (yPeakSmooth === null)
    ? peak
    : yPeakSmooth + Y_ALPHA * (peak - yPeakSmooth);
  yValleySmooth = (yValleySmooth === null)
    ? valley
    : yValleySmooth + Y_ALPHA * (valley - yValleySmooth)
  const top    = Math.ceil((yPeakSmooth + Y_HEADROOM) / 10) * 10;
  const bottom = Math.floor((yValleySmooth - 5) / 10) * 10;
  if (top !== spectrumLayout.yaxis.range[1] || bottom !== spectrumLayout.yaxis.range[0]) {
    spectrumLayout.yaxis.range = [bottom, top];
    document.getElementById("ref").value   = top;
    document.getElementById("range").value = Y_FLOOR;
  }
}

function rbwToFFT(fs,rbw){
return 2**Math.round(Math.log2(fs/rbw));
}

async function loadActiveComponents() {
  const res = await fetch("http://localhost:8000/rf/components");
  const components = await res.json();
  const strip = document.getElementById("componentList");
  strip.querySelectorAll(".componentRow").forEach(el => el.remove());
  components.forEach(c => {
    const wf  = c.waveform;
    const pill = document.createElement("div");
    pill.className = "componentRow" + (c.enabled ? "" : " disabled");
    pill.innerHTML =
      `<span class="c-name">${wf.name}</span>
       <span class="c-detail">${(wf.freq/1e6).toFixed(3)} MHz</span>
       <button onclick="openEditModal('sig',${c.id})">Edit</button>
       <button onclick="toggleComponent(${c.id},${!c.enabled})">${c.enabled?"Disable":"Enable"}</button>
       <button onclick="deleteComponent(${c.id})">✕</button>`;
    strip.appendChild(pill);
  });
}

async function loadBlocks() {
  const res    = await fetch("http://localhost:8000/rf/blocks");
  const blocks = await res.json();
  const strip  = document.getElementById("blockList");
  strip.querySelectorAll(".blockRow").forEach(el => el.remove());
  blocks.forEach(b => {
    const pill = document.createElement("div");
    pill.className = "blockRow" + (b.enabled ? "" : " disabled");
    pill.innerHTML =
      `<span class="b-name">${b.block.type ?? b.block.name}</span>
       <span class="b-detail">${blockSummary(b.block)}</span>
       <button onclick="openEditModal('blk',${b.id})">Edit</button>
       <button onclick="toggleBlock(${b.id},${!b.enabled})">${b.enabled?"Disable":"Enable"}</button>
       <button onclick="deleteBlock(${b.id})">✕</button>`;
    strip.appendChild(pill);
  });
}

function blockSummary(blk) {
  if (blk.type === "RFAmplifier")
    return `${blk.gain_db}dB  P1dB=${blk.p1db_in_dbm}dBm`;
  if (blk.type === "BandpassFilter")
    return `BW=${(blk.bandwidth_hz/1e6).toFixed(2)}MHz`;
  if (blk.type === "Mixer")
    return `LO=${(blk.lo_freq_hz/1e6).toFixed(2)}MHz`;
  return "";
}

// ── Unified modal ─────────────────────────────────────────────────────────
// mode:   'sig' = signal source, 'blk' = RF block
// action: 'add' | 'edit'
// editId: numeric id when editing
let _modalMode   = "sig";
let _modalAction = "add";
let _modalEditId = null;
let _modalType = "";
let componentDefs = {};
let blockDefs     = {};
let status = {};

// ── Demodulator state ──────────────────────────────────────────────────────
const DEMOD_DEFS = {
  QAM: [
    { name:"M",           label:"Constellation order M", default:16 },
    { name:"symbol_rate", label:"Symbol rate",            unit:"sym/s", default:1e6 },
  ]
};

async function loadDemod() {
  const res = await fetch("http://localhost:8000/rf/demodulator");
  const d   = await res.json();           // null when none active
  currentQAM_M = (d && d.type === "QAMDemodulator") ? d.M : null;
  if (!d) {
    lastEvmPercent = null;
    lastEvmPeakPercent = null;
    lastPhaseErrorDeg = null;
    lastPhaseErrorPeakDeg = null;
    renderEvmReadout();
    setEvmPerSymbol(null);
    setPhaseErrorsDeg(null);
    setEvmFreqData(null);
    setPhaseFreqData(null);
  }

  const sidebarBody = document.getElementById("constellationSidebarBody");
  if (sidebarBody) {
    sidebarBody.innerHTML = d
      ? `<div style="margin-bottom:4px;"><span style="color:#a78bfa;">${d.type}</span></div>
         <div>${demodSummary(d)}</div>
         <div style="margin-top:10px;display:flex;gap:6px;">
           <button onclick="openDemodEdit()" style="padding:4px 10px;font-size:11px;background:#1f2937;color:#ccc;border:1px solid #374151;border-radius:3px;cursor:pointer;">Edit</button>
           <button onclick="deleteDemod()" style="padding:4px 10px;font-size:11px;background:#1f2937;color:#ccc;border:1px solid #374151;border-radius:3px;cursor:pointer;">Remove</button>
         </div>`
      : `No demodulator active.<br><button onclick="openDemodAdd()" style="margin-top:10px;padding:4px 10px;font-size:11px;background:#1f2937;color:#ccc;border:1px solid #374151;border-radius:3px;cursor:pointer;">+ Add demodulator</button>`;
  }
}

function demodSummary(d) {
  if (d.type === "QAMDemodulator")
    return `${d.M}-QAM  ${(d.symbol_rate/1e3).toFixed(0)} ksym/s`;
  return "";
}

window.deleteDemod = async function() {

};

function renderDemodFields(type, current) {
  const div = document.getElementById("itemModalFields");
  div.innerHTML = "";
  (DEMOD_DEFS[type] || []).forEach(f => {
    const row = document.createElement("div");
    row.className = "mfRow";
    const label = document.createElement("label");
    label.textContent = f.unit ? `${f.label} [${f.unit}]` : f.label;
    const input = document.createElement("input");
    input.id    = "mf_" + f.name;
    input.value = current[f.name] ?? f.default ?? "";
    row.appendChild(label); row.appendChild(input);
    div.appendChild(row);
  });
}

function collectDemodParams(type) {
  const params = {};
  (DEMOD_DEFS[type] || []).forEach(f => {
    const raw = (document.getElementById("mf_" + f.name)?.value ?? "").trim();
    if (raw === "" || raw === "null") { params[f.name] = null; }
    else { const n = Number(raw); params[f.name] = Number.isNaN(n) ? raw : n; }
  });
  return params;
}

function openAddModal(mode) {
  _modalMode   = mode;
  _modalAction = "add";
  _modalEditId = null;
  const box   = document.getElementById("itemModalBox");
  const title = document.getElementById("itemModalTitle");
  const sel   = document.getElementById("itemTypeSelect");
  box.className = mode === "sig" ? "sig" : "blk";
  title.textContent = mode === "sig" ? "Add Signal Source" : "Add RF Block";
  document.getElementById("itemModalConfirm").textContent = "Add";
  // Populate type dropdown
  const defs = mode === "sig" ? componentDefs : blockDefs;
  sel.innerHTML = "";
  for (const name in defs) {
    const o = document.createElement("option");
    o.value = name; o.textContent = name;
    sel.appendChild(o);
  }
  sel.style.display = "";
  renderModalFields();
  document.getElementById("itemModal").classList.add("open");
}

window.openEditModal = async function(mode, id) {
  _modalMode   = mode;
  _modalAction = "edit";
  _modalEditId = id;
  const box   = document.getElementById("itemModalBox");
  const title = document.getElementById("itemModalTitle");
  const sel   = document.getElementById("itemTypeSelect");
  box.className = mode === "sig" ? "sig" : "blk";
  document.getElementById("itemModalConfirm").textContent = "Save";

  // Fetch current values from server
  let current = {};
  let typeName = "";
  if (mode === "sig") {
    const all = await fetch("http://localhost:8000/rf/components").then(r=>r.json());
    const c   = all.find(x => x.id === id);
    current   = c.waveform;
    typeName  = current.type;
    title.textContent = `Edit Signal — ${typeName}`;
  } else {
    const all = await fetch("http://localhost:8000/rf/blocks").then(r=>r.json());
    const b   = all.find(x => x.id === id);
    current   = b.block;
    typeName  = current.type;
    title.textContent = `Edit Block — ${typeName}`;
  }

  // Hide type selector (can't change type when editing)
  _modalType = typeName
  sel.style.display = "none";

  // Render fields pre-filled with current values
  const defs   = mode === "sig" ? componentDefs : blockDefs;
  const params = defs[typeName] || [];
  const div    = document.getElementById("itemModalFields");
  div.innerHTML = "";
  params.forEach(f => {
    const row   = document.createElement("div");
    row.className = "mfRow";
    const label = document.createElement("label");
    label.textContent = f.unit ? `${f.label} [${f.unit}]` : f.label;
    const input = document.createElement("input");
    input.id    = "mf_" + f.name;
    // Use current server value if available, fallback to default
    input.value = current[f.name] ?? f.default ?? "";
    row.appendChild(label); row.appendChild(input);
    div.appendChild(row);
  });

  // Store type for save step
  document.getElementById("itemTypeSelect").value = typeName;
  document.getElementById("itemModal").classList.add("open");
}

function renderModalFields() {
  const sel  = document.getElementById("itemTypeSelect");
  const type = sel.value;
  const defs = _modalMode === "sig" ? componentDefs : blockDefs;
  const div  = document.getElementById("itemModalFields");
  div.innerHTML = "";
  (defs[type] || []).forEach(f => {
    const row   = document.createElement("div");
    row.className = "mfRow";
    const label = document.createElement("label");
    label.textContent = f.unit ? `${f.label} [${f.unit}]` : f.label;
    const input = document.createElement("input");
    input.id    = "mf_" + f.name;
    input.value = f.default ?? "";
    row.appendChild(label); row.appendChild(input);
    div.appendChild(row);
  });
}

function closeModal() {
  document.getElementById("itemModal").classList.remove("open");
  document.getElementById("itemTypeSelect").style.display = "";
}

function collectModalParams(typeName) {
  const defs   = _modalMode === "sig" ? componentDefs : blockDefs;
  const params = {};

  (defs[typeName] || []).forEach(f => {
    const raw = (document.getElementById("mf_" + f.name)?.value ?? "").trim();
    if (raw === "" || raw === "null") { params[f.name] = null; }
    else { const n = Number(raw); params[f.name] = Number.isNaN(n) ? raw : n; }
  });
  return params;
}

document.getElementById("itemModalConfirm").onclick = async () => {
  // ── Demodulator path ────────────────────────────────────────────
  if (_modalMode === "dem") {
    const type   = document.getElementById("itemTypeSelect").value || _modalType;
    const params = collectDemodParams(type);
    if (_modalAction === "add") {
      await fetch("http://localhost:8000/rf/demodulator", {
        method:"POST", headers:{"Content-Type":"application/json"},
        body: JSON.stringify({type, params}),
      });
    } else {
      await fetch("http://localhost:8000/rf/demodulator", {
        method:"PATCH", headers:{"Content-Type":"application/json"},
        body: JSON.stringify({type, params}),
      });
    }
    closeModal();
    await loadDemod();
    return;
  }

  // ── Signal / RF block path (unchanged) ──────────────────────────
  const type   = _modalAction === "edit" ? _modalType : document.getElementById("itemTypeSelect").value;
  const params = collectModalParams(type);

  if (_modalAction === "add") {
    const url  = _modalMode === "sig" ? "http://localhost:8000/rf/components"
                                      : "http://localhost:8000/rf/blocks";
    await fetch(url, {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({type, params}),
    });
  } else {
    const url = _modalMode === "sig"
      ? `http://localhost:8000/rf/components/${_modalEditId}`
      : `http://localhost:8000/rf/blocks/${_modalEditId}`;
    await fetch(url, {
      method:"PATCH", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({type, params}),
    });
  }

  closeModal();
  if (_modalMode === "sig") await loadActiveComponents();
  else                       await loadBlocks();
};

function resetWaterfall() {

  // Zero out all buffers so old freq-range data doesn't linger
  wfBuffer.data.fill(0);
  if (wfPowerBuf) wfPowerBuf.fill(0);
  if (wfTimeBuf)  wfTimeBuf.fill(0);
  wfRows = 0;
  wfNewestTime = 0;
  wfCtx.putImageData(wfBuffer, 0, 0);
  // Clear the Y-axis SVG
  const svg = document.getElementById("waterfallAxisY");
  if (svg) svg.innerHTML = "";
}

    // Spectrum panel (plot) cannot be hidden — always keep at least one
    const visibleCount = document.querySelectorAll(".panel.visible").length;
    if (isOn && panelId === "plot") return;

const ws=new WebSocket("ws://localhost:8000/rf/stream");
await loadActiveComponents();
await loadBlocks();
await loadDemod();
await loadStatus();
ws.binaryType = "arraybuffer"

ws.onmessage = (event) => {
  if (!running) return;

  // Scalar frame: small JSON text message
  if (typeof event.data === "string") {
    const scalars = JSON.parse(event.data);
    lastTimeSec = scalars.time_sec;
    lastPacketType = scalars.packet_type;
    if (scalars.mean_evm_pct !== undefined) {
      lastEvmPercent = scalars.mean_evm_pct;
      renderEvmReadout();
    }
    if (scalars.peak_evm_pct !== undefined) {
      lastEvmPeakPercent = scalars.peak_evm_pct;
      renderEvmReadout();
    }
    if (scalars.mean_phase_error_deg !== undefined) {
      lastPhaseErrorDeg = scalars.mean_phase_error_deg;
      renderEvmReadout();
    }
    if (scalars.peak_phase_error_deg !== undefined) {
      lastPhaseErrorPeakDeg = scalars.peak_phase_error_deg;
      renderEvmReadout();
    }
    if (scalars.error_freq_axis !== undefined) {
      // Only sent when it actually changes (FFT size / symbol rate),
      // not every frame -- it's deterministic, not signal-dependent.
      lastErrorFreqAxis = scalars.error_freq_axis;
    }
    return;
  }

  // Binary frame: arrays only
  const buf = event.data;
  const dv = new DataView(buf);
  let off = 0;
  const constLen = dv.getUint32(off, true);
  off += 4;

  const power_db = new Float32Array(buf, off, status.fft_size);
  off += status.fft_size * 4;
  const iq_i = new Float32Array(buf, off, constLen);
  off += constLen * 4;
  const iq_q = new Float32Array(buf, off, constLen);
  off += constLen * 4;
  currentFs = status.sample_rate;
  freqMHz = status.freqs.map(f => f / 1e6);

  let evmFreqData = null;
  let phaseFreqData = null;

  const graphMode = document.getElementById("demodGraphMode")?.value || "time";

  if (lastPacketType === 2 && graphMode === "time") {
    const evmPerSymbol = new Float32Array(buf, off, constLen);
    off += constLen * 4;
    setEvmPerSymbol(evmPerSymbol);
    setPhaseErrorsDeg(null);
  } else if (lastPacketType === 2 && graphMode === "phase") {
    const phaseErrorsDeg = new Float32Array(buf, off, constLen);
    off += constLen * 4;
    setPhaseErrorsDeg(phaseErrorsDeg);
    setEvmPerSymbol(null);
  } else if (lastPacketType === 2 && graphMode === "freq") {
    const error_mag = new Float32Array(buf, off, constLen);
    off += constLen * 4;
    evmFreqData = { freqs: lastErrorFreqAxis, mag: error_mag };
  } else if (lastPacketType === 2 && graphMode === "phase_freq") {
    const error_phase_mag = new Float32Array(buf, off, constLen);
    off += constLen * 4;
    phaseFreqData = { freqs: lastErrorFreqAxis, mag: error_phase_mag };
  }

  setEvmFreqData(evmFreqData);
  setPhaseFreqData(phaseFreqData);

  autoscaleY(power_db);

Plotly.react(
"plot",
[{x:freqMHz,y:power_db,mode:"lines",line:{color:"#00ff99",width:2}}],
spectrumLayout
);
const constellationVisible =
    document.getElementById("constellation")
        .classList.contains("visible");
if(constellationVisible){
Plotly.react(
"constellationPlot",
[
  {x:iq_i,y:iq_q,mode:"markers",marker:{size:3,color:"#3b82f6"},type:"scattergl",showlegend:false},
  refTrace(),
],
constellationLayout
);
}

if(waterfallEnabled){
    drawWaterfallRow(power_db, freqMHz, lastTimeSec);
}
}
};
